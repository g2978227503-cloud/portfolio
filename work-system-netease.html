    <style>
        /* ── Project Detail Page ── */
        .project-header {
            padding: 12vh var(--page-pad) 6vh;
            border-bottom: 1px solid var(--border);
        }

        .project-title {
            font-size: 4vw;
            font-weight: 500;
            letter-spacing: -0.03em;
            margin-bottom: 2vh;
        }

        .project-meta {
            font-family: var(--font-mono);
            font-size: 0.8vw;
            color: var(--fg-mut);
            display: flex;
            gap: 2vw;
        }

        .detail-section {
            padding: 6vh var(--page-pad);
            border-bottom: 1px solid var(--border-light);
        }

        .section-title {
            font-size: 2vw;
            font-weight: 500;
            margin-bottom: 4vh;
            padding-bottom: 2vh;
            border-bottom: 1px solid var(--border-light);
        }

        .gallery-group {
            margin-bottom: 6vh;
        }

        .gallery-subtitle {
            font-family: var(--font-mono);
            font-size: 1vw;
            color: var(--fg-dim);
            margin-bottom: 2vh;
            text-transform: uppercase;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2vw;
        }

        .gallery-item {
            border: 1px solid var(--border-light);
            background: var(--bg);
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .gallery-item:hover {
            border-color: var(--fg-dim);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            .project-title { font-size: 8vw; }
            .project-meta { font-size: 2.5vw; flex-direction: column; gap: 1vh; }
            .section-title { font-size: 5vw; }
            .gallery-subtitle { font-size: 3vw; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
